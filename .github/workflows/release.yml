name: 🚀 Build & Release macOS App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 4.3.0）'
        required: true
        default: '4.3.0'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. 选择 Xcode 版本 ───────────────────────────────────────
      - name: 🛠 Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app
          xcodebuild -version

      # ── 3. 读取版本号 ─────────────────────────────────────────────
      - name: 📌 Get version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV

      # ── 4. 构建 ───────────────────────────────────────────────────
      # 说明：
      #   • 用 build 而非 archive，避免 archive 拉起 Splash 包内所有
      #     可执行子目标（SplashImageGen/SplashHTMLGen）导致编译失败
      #   • 强制覆写 MACOSX_DEPLOYMENT_TARGET=14.0：
      #     项目本地设为 macOS 26 beta，但 Xcode 16.3 最高支持 15.4，
      #     不覆写会导致 SDK 行为异常，CGImage 等 API 找不到
      #   • CONFIGURATION_BUILD_DIR 指定输出路径，方便后续定位 .app
      - name: 🔨 Build (arm64, deployment target 14.0)
        run: |
          BUILD_OUT="$RUNNER_TEMP/build_output"
          mkdir -p "$BUILD_OUT"

          xcodebuild \
            -project YumikoToys.xcodeproj \
            -scheme YumikoToys \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS='x86_64 i386' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CONFIGURATION_BUILD_DIR="$BUILD_OUT" \
            build 2>&1 | tee "$RUNNER_TEMP/build.log" | tail -80

      # ── 5. 上传构建日志（仅失败时）────────────────────────────────
      - name: 📋 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ runner.temp }}/build.log
          retention-days: 3

      # ── 6. 定位 .app ──────────────────────────────────────────────
      - name: 🔍 Locate .app
        run: |
          BUILD_OUT="$RUNNER_TEMP/build_output"
          # 先在指定输出目录找
          APP_PATH=$(find "$BUILD_OUT" -name "YumikoToys.app" -maxdepth 3 | head -1)
          # 备用：在 DerivedData 里找（排除 SourcePackages）
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$RUNNER_TEMP/DerivedData" \
              -name "YumikoToys.app" \
              -not -path "*/SourcePackages/*" \
              -not -path "*/Index.noindex/*" \
              -maxdepth 10 | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app，打印构建输出目录结构："
            find "$BUILD_OUT" -maxdepth 4 || true
            echo "--- 构建日志末尾 ---"
            tail -100 "$RUNNER_TEMP/build.log" || true
            exit 1
          fi
          echo "✅ App found: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ── 7. Ad-hoc 自签名 ──────────────────────────────────────────
      # ad-hoc 签名（使用 "-" 作为 identity），让用户右键→打开即可运行
      - name: ✍️ Ad-hoc codesign
        run: |
          # 对所有内嵌的可执行文件和动态库先单独签名
          find "$APP_PATH/Contents" \
            \( -type f -perm +111 -o -name "*.dylib" -o -name "*.framework" \) \
            | while read f; do
              codesign --force --sign - "$f" 2>/dev/null || true
            done
          # 对整个 .app bundle 签名
          codesign --force --deep --sign - \
            --options runtime \
            "$APP_PATH"
          # 验证
          codesign --verify --deep --strict "$APP_PATH" \
            && echo "✅ Ad-hoc 签名成功" \
            || echo "⚠️  签名验证警告（ad-hoc 预期行为）"

      # ── 8. 移除 quarantine 隔离属性 ───────────────────────────────
      - name: 🧹 Remove quarantine xattrs
        run: xattr -cr "$APP_PATH" || true

      # ── 9. 打包 .zip ──────────────────────────────────────────────
      - name: 🗜 Create ZIP
        run: |
          ZIP_NAME="YumikoToys-${{ env.VERSION }}-macOS-arm64.zip"
          cd "$(dirname "$APP_PATH")"
          ditto -c -k --keepParent "YumikoToys.app" "$RUNNER_TEMP/$ZIP_NAME"
          echo "ZIP_PATH=$RUNNER_TEMP/$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "📦 ZIP size: $(du -sh "$RUNNER_TEMP/$ZIP_NAME" | cut -f1)"

      # ── 10. 生成 Release Notes ────────────────────────────────────
      - name: 📝 Generate release notes
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## ⚡ 比利时野兔·本雅明塔学院 — v${{ env.VERSION }}

          > *Belgian Hare × Institute Benjamenta*

          ### 🧠 本地推理引擎（新增）
          - **MLX 本地推理引擎**：基于 Apple MLX 框架，支持 BGE-M3 嵌入模型（12层 Transformer）与 DistilBERT 情感分析模型（6层），所有计算在 Apple Silicon GPU 上完成，**零网络依赖**。
          - **代理感知下载器**：自动检测 PAC/HTTP/SOCKS 代理，支持断点续传与安全 Cookie 认证，全面兼容国内极速镜像通道。

          ### 🩺 多会话稳定性（重构）
          - **多会话删除防复活隔离**：删除会话时自动重置活跃会话 ID，彻底杜绝已删对话在磁盘"复活"的 Bug。
          - **人设生成时钟对齐**：延迟到用户切换会话时按需执行，消除启动时序卡顿缺陷。
          - **沙盒物理会话扫描**：后台学习引擎直接检索物理存储目录，修复分析计数器不增长的问题。
          - **增量分析时序落盘**：时空游标成功向前推进即强力写入磁盘，解决分析统计值被内存丢弃的 Bug。

          ### 🏷️ 交互体验（优化）
          - **右键菜单重命名 / 删除**：侧边栏挂载 SwiftUI 原生右键菜单，支持重命名和直接删除。
          - **删除二次确认微动画**：点击删除后图标微弹簧变形为垃圾桶，防止误触。
          - **防休眠嵌套手势阻断**：从物理层阻断多手势穿透，根治 macOS 双击冲突与连击卡顿。

          ### 🔥 性能调优
          - 单条推理去冗余分词填充，短文本向量生成速度提升 **5–50×**。
          - 编辑距离矩阵物理优化，内存占用减少 **99%**。
          - 记忆数据元组映射重构，极大减少运行时内存分配开销。
          - 修复下载进度条卡在 0% 的渲染故障。

          ### 🌱 AI 心智核心
          - 深度注入人本主义与 CBT 情感共情机制，大模型提供极具温度的情感接纳与心境抱持。
          - 自我决定（SDT）心理需求检测：新增"压力源"、"应对方式"、"胜任感"等特征检测组。

          ---

          ## 📥 安装说明

          1. 下载 `YumikoToys-${{ env.VERSION }}-macOS-arm64.zip` 并解压
          2. 将 `YumikoToys.app` 拖入「应用程序」文件夹
          3. **首次运行**：右键点击 app → 选择「打开」→ 在弹窗中点击「打开」
             > 本版本使用 ad-hoc 自签名，非 Apple 官方证书，仅需首次手动确认一次。
          4. 之后双击即可正常启动 ✅

          ### 可选：命令行一键解除隔离
          ```bash
          xattr -cr /Applications/YumikoToys.app
          ```

          ---

          ### 📋 系统要求
          | 项目 | 要求 |
          |------|------|
          | macOS | 14.0 (Sonoma) 或更高版本 |
          | 架构 | Apple Silicon（arm64）|
          | 本地模型推理 | M1 / M2 / M3 / M4 推荐 |
          EOF

      # ── 11. 发布 Release ──────────────────────────────────────────
      - name: 🎉 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "YumikoToys ${{ env.TAG_NAME }} — 比利时野兔·本雅明塔学院"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
