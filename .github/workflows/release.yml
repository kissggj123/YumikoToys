name: ✍️ Sign & Release Pre-compiled macOS DMG

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 4.3.0）'
        required: true
        default: '4.3.0'

jobs:
  sign-and-release:
    name: Sign & Release
    runs-on: macos-26  # 使用 macOS 26 原生环境运行签名与 DMG 打包任务
    permissions:
      contents: write  # 显式授予写权限，以便能够创建 Release 并上传资源包

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. 读取版本号 ─────────────────────────────────────────────
      - name: 📌 Get version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV

      # ── 3. 解压本地预编译包 ──────────────────────────────────────────
      # 使用 ditto -xk 而非 unzip：ditto 会自动剥离 macOS AppleDouble
      # 元数据文件（._* / __MACOSX），避免 codesign 报 "unsealed contents" 错误
      - name: 📂 Extract app (ditto)
        run: |
          if [ ! -f "YumikoToys_unsigned.zip" ]; then
            echo "❌ 未在仓库根目录下找到 YumikoToys_unsigned.zip 文件！"
            exit 1
          fi
          mkdir -p /tmp/sign_workspace
          ditto -xk "YumikoToys_unsigned.zip" /tmp/sign_workspace

          # 彻底清除残留的 AppleDouble 文件（._* 和 __MACOSX）
          find /tmp/sign_workspace -name '._*' -delete
          find /tmp/sign_workspace -name '__MACOSX' -type d -exec rm -rf {} + 2>/dev/null || true

          # 定位解压出来的 .app 路径
          APP_PATH=$(find "/tmp/sign_workspace" -name "YumikoToys.app" -maxdepth 2 -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 压缩包内未找到有效的 YumikoToys.app"
            exit 1
          fi
          echo "✅ 成功解压并定位 App: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ── 4. 清除扩展属性 ──────────────────────────────────────────────
      # 剥离所有干扰签名的 xattr（Finder 标记、隔离属性等）
      # 同时二次确认没有 ._ 文件残留在 bundle 内
      - name: 🧹 Clean xattrs & hidden files
        run: |
          echo "🧹 清除扩展属性..."
          xattr -cr "$APP_PATH" || true
          echo "🧹 二次清理 ._ 残留文件..."
          find "$APP_PATH" -name '._*' -delete
          echo "✅ 清理完成"

      # ── 5. Ad-hoc 自签名 ──────────────────────────────────────────
      - name: ✍️ Ad-hoc codesign
        run: |
          echo "1. 开始对内嵌的 Frameworks 签名..."
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -maxdepth 3 -name "*.framework" -type d -print0 2>/dev/null | while IFS= read -r -d '' fw; do
              echo "   正在签名 Framework: $fw"
              codesign --force --sign - "$fw" 2>/dev/null || true
            done
          fi

          echo "2. 开始对内嵌的 dylib/so/可执行文件签名..."
          find "$APP_PATH/Contents" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) -print0 2>/dev/null | while IFS= read -r -d '' f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done

          echo "3. 开始对标准的 App 整体进行深度签名..."
          # 启用 hardened runtime 并进行深度重签名
          if ! codesign --force --deep --sign - --options runtime "$APP_PATH" 2>/tmp/codesign_err.txt; then
            echo "❌ 签名失败！codesign 报错信息如下："
            cat /tmp/codesign_err.txt
            exit 1
          fi

          echo "4. 验证签名完整性..."
          codesign --verify --deep --strict "$APP_PATH" \
            && echo "✅ Ad-hoc 签名成功" \
            || echo "⚠️  签名验证警告（ad-hoc 预期行为）"

      # ── 6. 打包输出标准的磁盘映像 (.dmg) ──────────────────────────────
      - name: 💿 Create DMG
        run: |
          DMG_NAME="YumikoToys-${{ env.VERSION }}-macOS-arm64.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"
          
          echo "正在准备 DMG 临时打包目录结构..."
          DMG_STAGE="/tmp/dmg_stage"
          rm -rf "$DMG_STAGE"
          mkdir -p "$DMG_STAGE"
          
          # 使用 ditto 拷贝 App 保证权限和签名不丢失
          ditto "$APP_PATH" "$DMG_STAGE/YumikoToys.app"
          
          # 在 DMG 根目录下创建指向系统的 /Applications 快捷方式，实现拖拽安装
          ln -s /Applications "$DMG_STAGE/Applications"
          
          echo "正在使用 hdiutil 生成只读压缩 DMG..."
          hdiutil create \
            -volname "YumikoToys-${{ env.VERSION }}" \
            -srcfolder "$DMG_STAGE" \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
          echo "📦 DMG 大小: $(du -sh "$DMG_PATH" | cut -f1)"

      # ── 7. 生成 Release Notes ────────────────────────────────────
      - name: 📝 Generate release notes
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## ⚡ 比利时野兔·本雅明塔学院 — v${{ env.VERSION }}

          > *Belgian Hare × Institute Benjamenta*

          ### 🧠 本地推理引擎
          - **MLX 本地推理引擎**：基于 Apple MLX 框架，支持 BGE-M3 嵌入模型（12层 Transformer）与 DistilBERT 情感分析模型（6层），所有计算在 Apple Silicon GPU 上完成，**零网络依赖**。
          - **代理感知下载器**：自动检测 PAC/HTTP/SOCKS 代理，支持断点续传与安全 Cookie 认证，全面兼容国内极速镜像通道。

          ### 🩺 多会话稳定性（重构）
          - **多会话删除防复活隔离**：删除会话时自动重置活跃会话 ID，彻底杜绝已删对话在磁盘"复活"的 Bug。
          - **人设生成时钟对齐**：延迟到用户切换会话时按需执行，消除启动时序卡顿缺陷。
          - **沙盒物理会话扫描**：后台学习引擎直接检索物理存储目录，修复分析计数器不增长的问题。
          - **增量分析时序落盘**：时空游标成功向前推进即强力写入磁盘，解决分析统计值被内存丢弃的 Bug。

          ### 🏷️ 交互体验（优化）
          - **右键菜单重命名 / 删除**：侧边栏挂载 SwiftUI 原生右键菜单，支持重命名 and 直接删除。
          - **删除二次确认微动画**：点击删除后图标微弹簧变形为垃圾桶，防止误触。
          - **防休眠嵌套手势阻断**：从物理层阻断多手势穿透，根治 macOS 双击冲突与连击卡顿。

          ---

          ## 📥 安装说明

          1. 下载 `YumikoToys-${{ env.VERSION }}-macOS-arm64.dmg` 并双击打开
          2. 将 **YumikoToys** 图标拖入右侧的 **Applications (应用程序)** 快捷文件夹中完成安装
          3. **首次运行**：在「应用程序」中找到 YumikoToys → 右键点击图标 → 选择「打开」→ 在弹窗中点击「打开」
             > 本版本使用 ad-hoc 自签名，非 Apple 官方证书，仅需首次手动确认一次。
          4. 之后双击即可正常启动 ✅

          ### 可选：命令行一键解除隔离
          ```bash
          xattr -cr /Applications/YumikoToys.app
          ```

          ---

          ### 📋 系统要求
          | 项目 | 要求 |
          |------|------|
          | macOS | 14.0 (Sonoma) 或更高版本 |
          | 架构 | Apple Silicon（arm64）|
          | 本地模型推理 | M1 / M2 / M3 / M4 推荐 |
          EOF

      # ── 8. 发布 Release ──────────────────────────────────────────
      - name: 🎉 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "${{ env.TAG_NAME }} — 比利时野兔·本雅明塔学院"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          files: ${{ env.DMG_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. 清理仓库内的未签名包 ──────────────────────────────────
      # Release 发布成功后立即删除 zip，避免大文件长期驻留在 git 历史中
      - name: 🗑 Remove unsigned zip from repo
        if: success()
        run: |
          if [ -f "YumikoToys_unsigned.zip" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm YumikoToys_unsigned.zip
            git commit -m "chore: remove unsigned zip after release ${{ env.TAG_NAME }} [skip ci]"
            git push origin HEAD:main
            echo "✅ 已自动清除 YumikoToys_unsigned.zip"
          else
            echo "ℹ️  仓库中不存在 zip 文件，跳过清理"
          fi
