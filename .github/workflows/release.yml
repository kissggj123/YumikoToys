name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

permissions:
  contents: write

env:
  PROJECT: YumikoToys.xcodeproj
  SCHEME: YumikoToys
  APP_NAME: YumikoToys
  DEVELOPER_DIR: /Applications/Xcode.app

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Xcode 版本
        run: |
          xcodebuild -version
          swift --version

      - name: 验证本地 Splash 包
        run: |
          SPLASH_FILE="ThirdParty/Splash/Sources/SplashImageGen/Extensions/CGImage+WriteToURL.swift"
          if [ ! -d "ThirdParty/Splash" ]; then
            echo "ThirdParty/Splash 不存在，自动克隆并打补丁"
            mkdir -p ThirdParty
            git clone --depth 1 https://github.com/JohnSundell/Splash.git ThirdParty/Splash
          fi
          if [ -f "$SPLASH_FILE" ]; then
            if ! grep -q "import CoreGraphics" "$SPLASH_FILE"; then
              echo "给 CGImage+WriteToURL.swift 补上 import CoreGraphics"
              awk 'NR==1{print; print "import CoreGraphics"; next} {print}' "$SPLASH_FILE" > "$SPLASH_FILE.tmp" && mv "$SPLASH_FILE.tmp" "$SPLASH_FILE"
            fi
          fi
          echo "Splash 目录："
          ls -la ThirdParty/Splash/Sources/SplashImageGen/Extensions/

      - name: 导入证书（若已配置 secret ）
        id: codesign
        run: |
          if [ -z "${{ secrets.MACOS_CERTIFICATE_P12_DATA_BASE64 }}" ]; then
            echo "codesign=false" >> "$GITHUB_OUTPUT"
            echo "未配置 MACOS_CERTIFICATE_P12_DATA_BASE64，跳过签名与公证"
            exit 0
          fi
          echo "codesign=true" >> "$GITHUB_OUTPUT"

          CERTIFICATE_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="gh-signing-$(date +%s)"

          echo -n "${{ secrets.MACOS_CERTIFICATE_P12_DATA_BASE64 }}" | base64 -d > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "可用代码签名证书："
          security find-identity -p codesigning -v "$KEYCHAIN_PATH" | head -10

          rm -f "$CERTIFICATE_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: 解析 SPM 依赖
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            resolvePackageDependencies | tail -20

      - name: Release 编译
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            CODE_SIGN_STYLE=None \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | tail -40

      - name: 收集产物
        id: collect
        run: |
          APP_DIR="$RUNNER_TEMP/DerivedData/Build/Products/Release/$APP_NAME.app"
          if [ ! -d "$APP_DIR" ]; then
            echo "找不到 $APP_DIR，尝试其他路径"
            find "$RUNNER_TEMP/DerivedData" -name "$APP_NAME.app" -type d | head -3
            exit 1
          fi
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"
          ls -la "$APP_DIR/Contents/"

      - name: 签名（若有证书 secret）
        if: steps.codesign.outputs.codesign == 'true'
        run: |
          APP_DIR="${{ env.APP_DIR }}"
          # 先签所有嵌套 bundle（由内到外）
          while IFS= read -r bundle; do
            codesign --force --sign "Developer ID Application" \
              --entitlements "YumikoWidget/YumikoWidget.entitlements" \
              --options runtime --timestamp "$bundle" 2>&1
          done < <(find "$APP_DIR/Contents/PlugIns" -name "*.appex" -type d 2>/dev/null)

          # 主 App
          codesign --force --sign "Developer ID Application" \
            --entitlements "YumikoToys/Assets/YumikoToys.entitlements" \
            --options runtime --timestamp "$APP_DIR" 2>&1

          # 验证
          codesign -dv --entitlements :- "$APP_DIR" 2>&1 | head -20

      - name: 打 DMG
        id: dmg
        run: |
          APP_DIR="${{ env.APP_DIR }}"
          VERSION="${GITHUB_REF_NAME:-$(date +%Y%m%d)}"
          STAGING="$RUNNER_TEMP/staging"
          mkdir -p "$STAGING"
          cp -R "$APP_DIR" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          DMG="$RUNNER_TEMP/YumikoToys-${VERSION}-arm64.dmg"
          hdiutil create -volname "YumikoToys" -srcfolder "$STAGING" -ov -format UDZO "$DMG"
          ls -lh "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: 公证与钉章（仅 tag 推送且有证书）
        if: steps.codesign.outputs.codesign == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          DMG="${{ env.DMG }}"
          if [ -z "${{ secrets.NOTARYTOOL_APPLE_ID }}" ]; then
            echo "缺少 NOTARYTOOL_* secrets，跳过公证"
            exit 0
          fi
          echo "=== 上传 Apple 公证 ==="
          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.NOTARYTOOL_APPLE_ID }}" \
            --password "${{ secrets.NOTARYTOOL_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.NOTARYTOOL_TEAM_ID }}" \
            --wait | tail -20
          echo "=== 钉章 staple ==="
          xcrun stapler staple "$DMG" | tail -3

      - name: SHA256
        run: |
          DMG="${{ env.DMG }}"
          shasum -a 256 "$DMG" | tee "$RUNNER_TEMP/sha256.txt"

      - name: Release Notes
        run: |
          DMG="${{ env.DMG }}"
          VERSION="${{ env.VERSION }}"
          SIG_STATUS="${{ steps.codesign.outputs.codesign }}"
          NOTES="$RUNNER_TEMP/notes.md"
          {
            echo "# YumikoToys $VERSION"
            echo ""
            echo "| 项 | 值 |"
            echo "|---|---|"
            echo "| 构建方式 | xcodebuild Release + 本地 ThirdParty/Splash |"
            if [ "$SIG_STATUS" = "true" ]; then
              echo "| 签名状态 | Developer ID Application + notarized ✅ |"
              echo "| 使用方式 | 双击下载的 .dmg，拖进 Applications，直接打开 |"
            else
              echo "| 签名状态 | 未签名（未在 GitHub Secrets 配置证书/notarytool） |"
              echo "| 使用方式 | 下载后右键 \`YumikoToys.app\` → 打开 |"
            fi
            echo ""
            echo "提交：\`$(git rev-parse --short HEAD)\`"
          } > "$NOTES"
          echo "NOTES=$NOTES" >> "$GITHUB_ENV"

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.DMG }}
            ${{ env.RUNNER_TEMP }}/sha256.txt
          body_path: ${{ env.NOTES }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: 清理 keychain
        if: always() && steps.codesign.outputs.codesign == 'true'
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
