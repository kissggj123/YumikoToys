name: 🚀 Build & Release macOS App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 4.3.0）'
        required: true
        default: '4.3.0'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    permissions:
      contents: write  # 显式授予写权限，以便能够创建 Release 并上传资源包

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. 选择 Xcode 版本 ───────────────────────────────────────
      - name: 🛠 Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      # ── 3. 读取版本号 ─────────────────────────────────────────────
      - name: 📌 Get version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV

      # ── 3.5. 解析并修补第三方依赖 ───────────────────────────────────
      # 本步骤提前拉取 Swift 依赖包，并修复 Splash 库在 Swift 6 下缺少显式导入的编译缺陷
      - name: 📦 Resolve and patch dependencies
        run: |
          echo "正在解析 Swift 包依赖..."
          xcodebuild -resolvePackageDependencies \
            -project YumikoToys.xcodeproj \
            -scheme YumikoToys \
            -derivedDataPath "$RUNNER_TEMP/DerivedData"

          echo "正在定位并修复 SplashImageGen 的编译缺陷..."
          TARGET_FILE=$(find "$RUNNER_TEMP/DerivedData" -name "CGImage+WriteToURL.swift" | head -1)
          if [ -n "$TARGET_FILE" ]; then
            echo "发现目标文件: $TARGET_FILE"
            printf "import CoreGraphics\nimport Cocoa\n" > /tmp/patched.swift
            cat "$TARGET_FILE" >> /tmp/patched.swift
            mv /tmp/patched.swift "$TARGET_FILE"
            echo "✅ 源码修补成功"
          else
            echo "⚠️ 未找到 CGImage+WriteToURL.swift，可能无需修补或路径有变"
          fi

      # ── 4. 构建 ───────────────────────────────────────────────────
      - name: 🔨 Build (arm64, deployment target 14.0)
        run: |
          BUILD_OUT="$RUNNER_TEMP/build_output"
          mkdir -p "$BUILD_OUT"

          xcodebuild \
            -project YumikoToys.xcodeproj \
            -scheme YumikoToys \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS='x86_64 i386' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CONFIGURATION_BUILD_DIR="$BUILD_OUT" \
            build 2>&1 | tee "$RUNNER_TEMP/build.log" | tail -80

      # ── 5. 上传构建日志（仅失败时）────────────────────────────────
      - name: 📋 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ runner.temp }}/build.log
          retention-days: 3

      # ── 6. 定位 .app ──────────────────────────────────────────────
      - name: 🔍 Locate .app
        run: |
          BUILD_OUT="$RUNNER_TEMP/build_output"
          APP_PATH=$(find "$BUILD_OUT" -maxdepth 3 -name "YumikoToys.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$RUNNER_TEMP/DerivedData" \
              -maxdepth 10 \
              -name "YumikoToys.app" \
              -not -path "*/SourcePackages/*" \
              -not -path "*/Index.noindex/*" 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app，打印构建输出目录结构："
            find "$BUILD_OUT" -maxdepth 4 || true
            echo "--- 构建日志末尾 ---"
            tail -100 "$RUNNER_TEMP/build.log" || true
            exit 1
          fi
          echo "✅ App found: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      # ── 7. Ad-hoc 自签名 ──────────────────────────────────────────
      - name: ✍️ Ad-hoc codesign
        run: |
          find "$APP_PATH/Contents/Frameworks" -maxdepth 3 -name "*.framework" -type d -print0 2>/dev/null | while IFS= read -r -d '' fw; do
            codesign --force --sign - "$fw" 2>/dev/null || true
          done

          find "$APP_PATH/Contents" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) -print0 2>/dev/null | while IFS= read -r -d '' f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done

          codesign --force --deep --sign - \
            --options runtime \
            "$APP_PATH"

          codesign --verify --deep --strict "$APP_PATH" \
            && echo "✅ Ad-hoc 签名成功" \
            || echo "⚠️  签名验证警告（ad-hoc 预期行为）"

      # ── 8. 移除 quarantine 隔离属性 ───────────────────────────────
      - name: 🧹 Remove quarantine xattrs
        run: xattr -cr "$APP_PATH" || true

      # ── 9. 打包 .zip ──────────────────────────────────────────────
      - name: 🗜 Create ZIP
        run: |
          ZIP_NAME="YumikoToys-${{ env.VERSION }}-macOS-arm64.zip"
          cd "$(dirname "$APP_PATH")"
          ditto -c -k --keepParent "YumikoToys.app" "$RUNNER_TEMP/$ZIP_NAME"
          echo "ZIP_PATH=$RUNNER_TEMP/$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "📦 ZIP size: $(du -sh "$RUNNER_TEMP/$ZIP_NAME" | cut -f1)"

      # ── 10. 生成 Release Notes ────────────────────────────────────
      - name: 📝 Generate release notes
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## ⚡ 比利时野兔·本雅明塔学院 — v${{ env.VERSION }}

          > *Belgian Hare × Institute Benjamenta*

          ### 🧠 本地推理引擎（新增）
          - **MLX 本地推理引擎**：基于 Apple MLX 框架，支持 BGE-M3 嵌入模型（12层 Transformer）与 DistilBERT 情感分析模型（6层），所有计算在 Apple Silicon GPU 上完成，**零网络依赖**。
          - **代理感知下载器**：自动检测 PAC/HTTP/SOCKS 代理，支持断点续传与安全 Cookie 认证，全面兼容国内极速镜像通道。

          ### 🩺 多会话稳定性（重构）
          - **多会话删除防复活隔离**：删除会话时自动重置活跃会话 ID，彻底杜绝已删对话在磁盘"复活"的 Bug。
          - **人设生成时钟对齐**：延迟到用户切换会话时按需执行，消除启动时序卡顿缺陷。
          - **沙盒物理会话扫描**：后台学习引擎直接检索物理存储目录，修复分析计数器不增长的问题。
          - **增量分析时序落盘**：时空游标成功向前推进即强力写入磁盘，解决分析统计值被内存丢弃的 Bug。

          ### 🏷️ 交互体验（优化）
          - **右键菜单重命名 / 删除**：侧边栏挂载 SwiftUI 原生右键菜单，支持重命名和直接删除。
          - **删除二次确认微动画**：点击删除后图标微弹簧变形为垃圾桶，防止误触。
          - **防休眠嵌套手势阻断**：从物理层阻断多手势穿透，根治 macOS 双击冲突与连击卡顿。

          ### 🔥 性能调优
          - 单条推理去冗余分词填充，短文本向量生成速度提升 **5–50×**。
          - 编辑距离矩阵物理优化，内存占用减少 **99%**。
          - 记忆数据元组映射重构，极大减少运行时内存分配开销。
          - 修复下载进度条卡在 0% 的渲染故障。

          ### 🌱 AI 心智核心
          - 深度注入人本主义与 CBT 情感共情机制，大模型提供极具温度的情感接纳与心境抱持。
          - 自我决定（SDT）心理需求检测：新增"压力源"、"应对方式"、"胜任感"等特征检测组。

          ---

          ## 📥 安装说明

          1. 下载 `YumikoToys-${{ env.VERSION }}-macOS-arm64.zip` 并解压
          2. 将 `YumikoToys.app` 拖入「应用程序」文件夹
          3. **首次运行**：右键点击 app → 选择「打开」→ 在弹窗中点击「打开」
             > 本版本使用 ad-hoc 自签名，非 Apple 官方证书，仅需首次手动确认一次。
          4. 之后双击即可正常启动 ✅

          ### 可选：命令行一键解除隔离
          ```bash
          xattr -cr /Applications/YumikoToys.app
          ```

          ---

          ### 📋 系统要求
          | 项目 | 要求 |
          |------|------|
          | macOS | 14.0 (Sonoma) 或更高版本 |
          | 架构 | Apple Silicon（arm64）|
          | 本地模型推理 | M1 / M2 / M3 / M4 推荐 |
          EOF

      # ── 11. 发布 Release ──────────────────────────────────────────
      - name: 🎉 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "YumikoToys ${{ env.TAG_NAME }} — 比利时野兔·本雅明塔学院"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
